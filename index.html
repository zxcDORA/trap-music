<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrapMusic Fixed</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body { background:#050505;color:white }
.active{color:red}
</style>
</head>
<body>

<div class="flex h-screen">

<div class="w-64 bg-black p-4 border-r border-red-900">
<h1 class="text-red-500 mb-4">TRAP</h1>
<button onclick="uploadClick()">Загрузить</button>
<button onclick="createPlaylist()">+ Плейлист</button>
<button onclick="showLibrary()" id="backBtn">⬅</button>
<div id="playlists"></div>
</div>

<div class="flex-1 p-4" id="tracks"></div>

</div>

<div class="fixed bottom-0 w-full bg-black p-2 flex gap-3">
<button onclick="prev()" id="prevBtn"></button>
<button onclick="toggle()" id="playBtn"></button>
<button onclick="next()" id="nextBtn"></button>
</div>

<input type="file" id="fileInput" multiple hidden>
<audio id="audio"></audio>

<script>
let tracks=[];
let playlists=JSON.parse(localStorage.getItem('playlists')||'[]');
let current=0,playing=false;

const audio=document.getElementById('audio');
const fileInput=document.getElementById('fileInput');
const tracksDiv=document.getElementById('tracks');
const playlistsDiv=document.getElementById('playlists');

// SVG
const playSVG='<svg width="24" height="24" stroke="white" fill="none"><circle cx="12" cy="12" r="10"/><path d="M9 9l6 3-6 3z"/></svg>';
const pauseSVG='<svg width="24" height="24" stroke="white" fill="none"><circle cx="12" cy="12" r="10"/><rect x="9" y="9" width="6" height="6"/></svg>';
const prevSVG='<svg width="24" height="24" stroke="white" fill="none"><path d="m17 18-6-6 6-6"/><path d="M7 6v12"/></svg>';
const nextSVG='<svg width="24" height="24" stroke="white" fill="none"><path d="m7 18 6-6-6-6"/><path d="M17 6v12"/></svg>';

prevBtn.innerHTML=prevSVG;
nextBtn.innerHTML=nextSVG;
playBtn.innerHTML=playSVG;

// загрузка
function uploadClick(){ fileInput.click(); }

fileInput.onchange=e=>{
 for(let f of e.target.files){
  if(!f.type.startsWith('audio/')) continue;
  tracks.push({name:f.name,src:URL.createObjectURL(f)});
 }
 renderTracks();
}

function renderTracks(){
 tracksDiv.innerHTML='';
 tracks.forEach((t,i)=>{
  let d=document.createElement('div');
  d.innerText=t.name;
  d.onclick=()=>play(i);
  tracksDiv.appendChild(d);
 });
}

function play(i){
 current=i;
 audio.src=tracks[i].src;
 audio.play();
 playing=true;
 update();
}

function toggle(){
 if(!audio.src)return;
 playing?audio.pause():audio.play();
 playing=!playing;
 update();
}

function update(){
 playBtn.innerHTML=playing?pauseSVG:playSVG;
}

function next(){
 if(!tracks.length)return;
 current=(current+1)%tracks.length;
 play(current);
}

function prev(){
 if(!tracks.length)return;
 current=(current-1+tracks.length)%tracks.length;
 play(current);
}

// плейлисты
function createPlaylist(){
 let name=prompt('Название');
 if(!name)return;
 playlists.push({name,tracks:[]});
 save(); renderPlaylists();
}

function renderPlaylists(){
 playlistsDiv.innerHTML='';
 playlists.forEach((p,i)=>{
  let d=document.createElement('div');
  d.innerText=p.name;
  d.onclick=()=>showPlaylist(i);
  playlistsDiv.appendChild(d);
 });
}

function showPlaylist(i){
 tracksDiv.innerHTML='';
 playlists[i].tracks.forEach(idx=>{
  let t=tracks[idx];
  let d=document.createElement('div');
  d.innerText=t.name;
  d.onclick=()=>play(idx);
  tracksDiv.appendChild(d);
 });
}

function showLibrary(){
 renderTracks();
}

function save(){
 localStorage.setItem('playlists',JSON.stringify(playlists));
}

renderTracks();
renderPlaylists();
</script>

</body>
</html>
