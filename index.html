<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrapMusic Final+</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body{background:#050505;color:white}
button{transition:0.2s}
button:hover{color:red;transform:scale(1.05)}
.active{color:red}

input[type="range"]{
 -webkit-appearance:none;height:4px;border-radius:5px;
 background:linear-gradient(to right,#ff0000 0%,#ff0000 var(--value,0%),#300 var(--value,0%),#300 100%);
}
input[type="range"]::-webkit-slider-thumb{
 -webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:#ff0000;
}
</style>
</head>
<body>

<div class="flex h-screen">

<div class="w-64 bg-black p-4 border-r border-red-900 flex flex-col gap-3">
<h1 class="text-red-500">TRAPMUSIC</h1>
<button onclick="uploadClick()" class="w-full text-left">Загрузить</button>
<button onclick="createPlaylist()" class="w-full text-left">+ Плейлист</button>
<button onclick="showLibrary()" class="w-full text-left">⬅ Библиотека</button>
<div id="playlists" class="mt-4"></div>
</div>

<div class="flex-1 p-4" id="tracks"></div>

</div>

<!-- PLAYER -->
<div class="fixed bottom-0 w-full bg-black border-t border-red-900 p-4 flex items-center justify-between">

<!-- LEFT -->
<div class="flex items-center gap-3">
<img id="cover" src="" class="w-12 h-12 bg-gray-800 rounded"/>
<div>
<div id="trackName">Нет трека</div>
<div id="time">0:00 / 0:00</div>
</div>
</div>

<!-- CENTER -->
<div class="flex flex-col items-center w-1/3">
<div class="flex gap-3 mb-1">
<button onclick="prev()">⏮</button>
<button onclick="toggle()" id="playBtn">▶</button>
<button onclick="next()">⏭</button>
<button onclick="toggleShuffle()" id="shuffleBtn">🔀</button>
<button onclick="toggleRepeat()" id="repeatBtn">🔁</button>
</div>
<input type="range" id="progress" min="0" max="100" value="0" class="w-full">
</div>

<!-- RIGHT -->
<div class="flex items-center gap-2">
<span>🔊</span>
<input type="range" id="volume" min="0" max="1" step="0.01" value="1" class="w-32">
</div>

</div>

<input type="file" id="fileInput" accept="audio/*" multiple hidden>
<audio id="audio"></audio>

<script>
let tracks=[];
let playlists=JSON.parse(localStorage.getItem('playlists')||'[]');
let current=0,playing=false,shuffle=false,repeat=false,currentPlaylist=null;

const audio=document.getElementById('audio');
const progress=document.getElementById('progress');
const volume=document.getElementById('volume');
const fileInput=document.getElementById('fileInput');

function uploadClick(){ fileInput.click(); }

fileInput.onchange=e=>{
 for(let f of e.target.files){
  if(!f.type.startsWith('audio/')) continue;
  const url = URL.createObjectURL(f);

// попытка вытащить обложку
let coverURL = '';
try {
 const reader = new FileReader();
 reader.onload = function(e) {
   const buffer = e.target.result;
   const view = new DataView(buffer);
   for (let i = 0; i < view.byteLength - 10; i++) {
     if (
       view.getUint8(i) === 0x41 && // A
       view.getUint8(i+1) === 0x50 && // P
       view.getUint8(i+2) === 0x49 && // I
       view.getUint8(i+3) === 0x43
     ) {
       let size = view.getUint32(i+4);
       let start = i + 10;
       let blob = new Blob([buffer.slice(start, start + size)]);
       coverURL = URL.createObjectURL(blob);
     }
   }
 };
 reader.readAsArrayBuffer(f);
} catch(e){}

tracks.push({name:f.name,src:url,cover:coverURL});
 }
 renderTracks();
}

function renderTracks(){
 currentPlaylist=null;
 let c=document.getElementById('tracks');
 c.innerHTML='';
 tracks.forEach((t,i)=>{
  let d=document.createElement('div');
  d.className='flex justify-between border p-2 mb-2';
  d.innerHTML=`${t.name}
  <button onclick="event.stopPropagation();removeTrack(${i})">🗑</button>`;
  d.onclick=()=>play(i);
  c.appendChild(d);
 });
}

function play(i){
 current=i;
 audio.src=tracks[i].src;
 audio.play();
 playing=true;
 document.getElementById('trackName').innerText=tracks[i].name;

// обложка
let cover = document.getElementById('cover');
cover.src = tracks[i].cover || '';
cover.style.background = tracks[i].cover ? 'none' : '#222';
 update();
}

function toggle(){
 if(!audio.src)return;
 playing?audio.pause():audio.play();
 playing=!playing;
 update();
}

function update(){
 document.getElementById('playBtn').innerText=playing?'⏹':'▶';
}

function next(){
 if(!tracks.length)return;
 current=shuffle?Math.floor(Math.random()*tracks.length):(current+1)%tracks.length;
 play(current);
}

function prev(){
 if(!tracks.length)return;
 current=(current-1+tracks.length)%tracks.length;
 play(current);
}

function toggleShuffle(){ shuffle=!shuffle;shuffleBtn.classList.toggle('active'); }
function toggleRepeat(){ repeat=!repeat;repeatBtn.classList.toggle('active'); }

audio.onended=()=>{ repeat?play(current):next(); }

function createPlaylist(){
 let name=prompt('Название');
 if(!name)return;
 playlists.push({name,tracks:[]});
 save(); renderPlaylists();
}

function addToPlaylist(i){
 if(!playlists.length){alert('Создай плейлист');return;}
 let list=playlists.map((p,i)=>i+': '+p.name).join('\n');
 let c=parseInt(prompt(list));
 if(!isNaN(c)&&playlists[c]){
  playlists[c].tracks.push(i);
  save();
 }
}

function removeTrack(i){ tracks.splice(i,1); renderTracks(); }

function renderPlaylists(){
 let c=document.getElementById('playlists');
 c.innerHTML='';
 playlists.forEach((p,i)=>{
  let d=document.createElement('div');
  d.className='flex justify-between items-center mb-1 cursor-pointer';
  d.innerHTML=`
    <span>${p.name}</span>
    <button onclick="event.stopPropagation();removePlaylist(${i})">🗑</button>
  `;
  d.onclick=()=>showPlaylist(i);
  c.appendChild(d);
 });
}

function removePlaylist(i){
 playlists.splice(i,1);
 save();
 renderPlaylists();
 showLibrary();
});
}

function showPlaylist(i){
 currentPlaylist=i;
 let c=document.getElementById('tracks');
 c.innerHTML='';
 playlists[i].tracks.forEach((idx,ind)=>{
  let t=tracks[idx];
  let d=document.createElement('div');
  d.className='flex justify-between border p-2 mb-2';
  d.innerHTML=`${t.name}
  <button onclick="event.stopPropagation();removeFromPlaylist(${ind})">🗑</button>`;
  d.onclick=()=>play(idx);
  c.appendChild(d);
 });
}

function removeFromPlaylist(ind){
 playlists[currentPlaylist].tracks.splice(ind,1);
 save(); showPlaylist(currentPlaylist);
}

function save(){ localStorage.setItem('playlists',JSON.stringify(playlists)); }
function showLibrary(){ renderTracks(); }

// TIME + PROGRESS
function format(t){
 let m=Math.floor(t/60)||0;
 let s=Math.floor(t%60)||0;
 return m+':'+(s<10?'0'+s:s);
}

audio.addEventListener('timeupdate',()=>{
 if(audio.duration){
  progress.value=(audio.currentTime/audio.duration)*100;
  progress.style.setProperty('--value',progress.value+'%');
  document.getElementById('time').innerText=
   format(audio.currentTime)+' / '+format(audio.duration);
 }
});

progress.oninput=()=>{
 if(audio.duration){ audio.currentTime=(progress.value/100)*audio.duration; }
};

volume.oninput=()=>{
 audio.volume=volume.value;
 volume.style.setProperty('--value',(volume.value*100)+'%');
};

renderTracks();
renderPlaylists();
</script>

</body>
</html>
