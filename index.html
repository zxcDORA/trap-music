<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrapMusic Ultimate</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body { background:#050505; }
.glow { box-shadow:0 0 12px rgba(255,0,0,0.7); }
.scroll::-webkit-scrollbar { width:6px; }
.scroll::-webkit-scrollbar-thumb { background:#ff0000; }
</style>
</head>
<body class="text-white">

<div class="flex h-screen">

<div class="w-64 bg-black p-5 border-r border-red-900">
<h1 class="text-2xl text-red-500 mb-6">TRAPMUSIC</h1>

<button onclick="uploadClick()" class="bg-red-600 w-full py-2 rounded glow mb-4">Загрузить музыку</button>
<button onclick="createPlaylist()" class="bg-red-900 w-full py-2 rounded mb-4">+ Плейлист</button>

<div id="playlists" class="space-y-2"></div>
</div>

<div class="flex-1 p-6 overflow-y-auto scroll">
<input id="search" placeholder="Поиск..." class="w-full p-2 mb-6 bg-black border border-red-900 rounded">

<h2 class="text-lg mb-4">Библиотека</h2>
<div id="tracks" class="grid grid-cols-5 gap-4"></div>
</div>

<div class="w-64 bg-black p-4 border-l border-red-900">
<h2 class="mb-4">Очередь</h2>
<div id="queue"></div>
</div>
</div>

<div class="fixed bottom-0 left-0 right-0 bg-black border-t border-red-900 p-3 flex items-center justify-between">
<div><div id="now">Нет трека</div></div>

<div class="flex gap-3">
<button onclick="prev()">⏮</button>
<button onclick="toggle()" class="bg-red-600 px-4 py-2 rounded-full glow">▶</button>
<button onclick="next()">⏭</button>
<button onclick="shuffle()">🔀</button>
<button onclick="repeat()">🔁</button>
</div>

<input type="range" id="progress" min="0" max="100" value="0" class="w-1/3">
<input type="range" id="volume" min="0" max="1" step="0.01" value="1">
</div>

<input type="file" id="fileInput" accept="audio/*" multiple hidden>
<audio id="audio"></audio>

<script>
let tracks=[];
let queue=[];
let playlists=[];
let current=0;
let playing=false;
let repeatMode=false;

const audio=document.getElementById('audio');
const progress=document.getElementById('progress');
const volume=document.getElementById('volume');
const now=document.getElementById('now');
const fileInput=document.getElementById('fileInput');

function uploadClick(){ fileInput.click(); }

fileInput.onchange=e=>{
 for(let f of e.target.files){
  if(!f.type.startsWith('audio/')){
    alert('Файл не поддерживается: '+f.name);
    continue;
  }
  let url=URL.createObjectURL(f);
  tracks.push({name:f.name,src:url});
 }
 renderTracks();
}

function renderTracks(){
 let c=document.getElementById('tracks');
 c.innerHTML='';
 tracks.forEach((t,i)=>{
  let d=document.createElement('div');
  d.className='p-3 border border-red-900 rounded hover:bg-red-900 cursor-pointer';
  d.innerHTML=`${t.name}<br>
  <button onclick="event.stopPropagation();addQueue(${i})">+</button>
  <button onclick="event.stopPropagation();like(${i})">❤️</button>`;
  d.onclick=()=>play(i);
  c.appendChild(d);
 });
}

async function play(i){
 try{
  current=i;
  audio.src=tracks[i].src;
  await audio.play();
  now.innerText=tracks[i].name;
  playing=true;
 }catch(err){
  console.error(err);
  alert('Ошибка воспроизведения. Возможно формат не поддерживается');
 }
}

function toggle(){
 if(!audio.src)return;
 playing?audio.pause():audio.play().catch(()=>{});
 playing=!playing;
}

function next(){
 if(queue.length){
  play(queue.shift());
 }else if(tracks.length){
  play((current+1)%tracks.length);
 }
 renderQueue();
}

function prev(){ if(tracks.length) play(current); }

function shuffle(){ tracks.sort(()=>Math.random()-0.5); renderTracks(); }

function repeat(){ repeatMode=!repeatMode; alert('Repeat: '+repeatMode); }

function addQueue(i){ queue.push(i); renderQueue(); }

function renderQueue(){
 let q=document.getElementById('queue');
 q.innerHTML='';
 queue.forEach(i=>{
  let d=document.createElement('div');
  d.innerText=tracks[i].name;
  q.appendChild(d);
 });
}

function like(i){ alert('Лайк: '+tracks[i].name); }

function createPlaylist(){
 let name=prompt('Название');
 if(!name)return;
 playlists.push({name,tracks:[]});
 renderPlaylists();
}

function renderPlaylists(){
 let c=document.getElementById('playlists');
 c.innerHTML='';
 playlists.forEach(p=>{
  let d=document.createElement('div');
  d.className='cursor-pointer hover:text-red-500';
  d.innerText=p.name;
  c.appendChild(d);
 });
}

audio.addEventListener('timeupdate',()=>{
 if(isFinite(audio.duration)&&audio.duration>0){
  progress.value=(audio.currentTime/audio.duration)*100;
 }
});

progress.oninput=()=>{
 if(isFinite(audio.duration)&&audio.duration>0){
  let t=(progress.value/100)*audio.duration;
  if(isFinite(t)) audio.currentTime=t;
 }
}

volume.oninput=()=> audio.volume=volume.value;

audio.onended=()=>{
 if(repeatMode) play(current);
 else next();
}

search.oninput=e=>{
 let val=e.target.value.toLowerCase();
 document.querySelectorAll('#tracks div').forEach(d=>{
  d.style.display=d.innerText.toLowerCase().includes(val)?'block':'none';
 });
}
</script>

</body>
</html>
