<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrapMusic Ultimate</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body { background:#050505; }
.glow { box-shadow:0 0 12px rgba(255,0,0,0.7); }
.cover { width:40px;height:40px;border-radius:6px;object-fit:cover;background:#111;border:1px solid #400; }
</style>
</head>
<body class="text-white">

<div class="flex h-screen">

<div class="w-64 bg-black p-5 border-r border-red-900">
<h1 class="text-2xl text-red-500 mb-6">TRAPMUSIC</h1>
<button onclick="uploadClick()" class="bg-red-600 w-full py-2 rounded glow mb-4">Загрузить</button>
<button onclick="createPlaylist()" class="bg-red-900 w-full py-2 rounded mb-4">+ Плейлист</button>
<button onclick="showLibrary()" class="bg-gray-800 w-full py-2 rounded mb-4">⬅ Библиотека</button>
<div id="playlists"></div>
</div>

<div class="flex-1 p-6 overflow-y-auto">
<input id="search" placeholder="Поиск..." class="w-full p-2 mb-6 bg-black border border-red-900 rounded">
<div id="tracks"></div>
</div>

</div>

<div class="fixed bottom-0 left-0 right-0 bg-black border-t border-red-900 p-3 flex justify-between">
<div id="now">Нет трека</div>
<div>
<button onclick="prev()">⏮</button>
<button onclick="toggle()"><svg xmlns="http://www.w3.org/2000/svg" width="15" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-circle-play-icon lucide-circle-play"><path d="M9 9.003a1 1 0 0 1 1.517-.859l4.997 2.997a1 1 0 0 1 0 1.718l-4.997 2.997A1 1 0 0 1 9 14.996z"/><circle cx="12" cy="12" r="10"/></svg></button>
<button onclick="next()">⏭</button>
</div>
</div>

<input type="file" id="fileInput" accept="audio/*" multiple hidden>
<audio id="audio"></audio>

<script>
let db;
let tracks=[];
let playlists=[];
let current=0;
let playing=false;

const audio=document.getElementById('audio');
const now=document.getElementById('now');
const fileInput=document.getElementById('fileInput');

// IndexedDB init
let request=indexedDB.open('musicDB',1);
request.onupgradeneeded=e=>{
 db=e.target.result;
 db.createObjectStore('tracks',{keyPath:'id',autoIncrement:true});
};
request.onsuccess=e=>{
 db=e.target.result;
 loadTracks();
};

function saveTrack(file){
 let tx=db.transaction('tracks','readwrite');
 let store=tx.objectStore('tracks');
 store.add({name:file.name,file});
}

function loadTracks(){
 let tx=db.transaction('tracks','readonly');
 let store=tx.objectStore('tracks');
 let req=store.getAll();
 req.onsuccess=()=>{
  tracks=req.result;
  renderTracks();
 };
}

function uploadClick(){ fileInput.click(); }

fileInput.onchange=e=>{
 for(let f of e.target.files){
  if(!f.type.startsWith('audio/')) continue;
  saveTrack(f);
 }
 setTimeout(loadTracks,500);
}

function renderTracks(){
 let c=document.getElementById('tracks');
 c.innerHTML='';
 tracks.forEach((t,i)=>{
  let row=document.createElement('div');
  row.className='flex justify-between p-3 border border-red-900 rounded mb-2';

  let url=URL.createObjectURL(t.file);

  row.innerHTML=`
    <div class="flex gap-3 items-center">
      <img class="cover" onclick="uploadCover(${i})">
      <div>${t.name}</div>
    </div>
    <div>
      <button onclick="event.stopPropagation();addToPlaylist(${i})">📂</button>
    </div>
  `;

  row.onclick=()=>play(url,t.name);
  c.appendChild(row);
 });
}

function play(src,name){
 audio.src=src;
 audio.play();
 now.innerText=name;
}

function toggle(){ playing?audio.pause():audio.play(); playing=!playing; }
function next(){}
function prev(){}

function createPlaylist(){
 let name=prompt('Название');
 if(!name)return;
 playlists.push({name,tracks:[]});
 localStorage.setItem('playlists',JSON.stringify(playlists));
 renderPlaylists();
}

function addToPlaylist(i){
 let names=playlists.map((p,i)=>i+':'+p.name).join('\n');
 let choice=prompt(names);
 if(playlists[choice]) playlists[choice].tracks.push(i);
 localStorage.setItem('playlists',JSON.stringify(playlists));
}

function renderPlaylists(){
 let c=document.getElementById('playlists');
 c.innerHTML='';
 playlists.forEach((p,i)=>{
  let d=document.createElement('div');
  d.innerText=p.name;
  d.onclick=()=>showPlaylist(i);
  c.appendChild(d);
 });
}

function showPlaylist(i){
 let list=playlists[i];
 let c=document.getElementById('tracks');
 c.innerHTML='';
 list.tracks.forEach(idx=>{
  let t=tracks[idx];
  let row=document.createElement('div');
  row.innerText=t.name;
  row.onclick=()=>play(URL.createObjectURL(t.file),t.name);
  c.appendChild(row);
 });
}

function showLibrary(){ loadTracks(); }

// load playlists
playlists=JSON.parse(localStorage.getItem('playlists')||'[]');
renderPlaylists();
</script>

</body>
</html>
