<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrapMusic Final</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body{background:#050505;color:white}
button{transition:0.2s}
button:hover{color:red;transform:scale(1.05)}
.active{color:red}

input[type="range"]{
 -webkit-appearance:none;height:4px;border-radius:5px;
 background:linear-gradient(to right,#ff0000 0%,#ff0000 var(--value,0%),#300 var(--value,0%),#300 100%);
}
input[type="range"]::-webkit-slider-thumb{
 -webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:#ff0000;
}
</style>
</head>
<body>

<div class="flex h-screen">

<div class="w-64 bg-black p-4 border-r border-red-900">
<h1 class="text-red-500 mb-4">TRAPMUSIC</h1>
<button onclick="uploadClick()">Загрузить</button>
<button onclick="createPlaylist()">+ Плейлист</button>
<button onclick="showLibrary()">⬅ Библиотека</button>
<div id="playlists"></div>
</div>

<div class="flex-1 p-4" id="tracks"></div>

</div>

<div class="fixed bottom-0 w-full bg-black border-t border-red-900 p-2 flex items-center gap-4">
<button onclick="prev()">⏮</button>
<button onclick="toggle()" id="playBtn">▶</button>
<button onclick="next()">⏭</button>
<button onclick="toggleShuffle()" id="shuffleBtn">🔀</button>
<button onclick="toggleRepeat()" id="repeatBtn">🔁</button>

<input type="range" id="progress" min="0" max="100" value="0" class="w-1/3">
<input type="range" id="volume" min="0" max="1" step="0.01" value="1" class="w-32">
</div>

<input type="file" id="fileInput" accept="audio/*" multiple hidden>
<audio id="audio"></audio>

<script>
let tracks=[];
let playlists=JSON.parse(localStorage.getItem('playlists')||'[]');
let current=0,playing=false,shuffle=false,repeat=false;

const audio=document.getElementById('audio');
const progress=document.getElementById('progress');
const volume=document.getElementById('volume');
const fileInput=document.getElementById('fileInput');

function uploadClick(){ fileInput.click(); }

fileInput.onchange=e=>{
 for(let f of e.target.files){
  if(!f.type.startsWith('audio/')) continue;
  tracks.push({name:f.name,src:URL.createObjectURL(f),liked:false});
 }
 renderTracks();
}

function renderTracks(){
 let c=document.getElementById('tracks');
 c.innerHTML='';
 tracks.forEach((t,i)=>{
  let d=document.createElement('div');
  d.className='flex justify-between border p-2 mb-2';
  d.innerHTML=`
    ${t.name}
    <div>
      <button onclick="event.stopPropagation();like(${i})">❤️</button>
      <button onclick="event.stopPropagation();addToPlaylist(${i})">➕</button>
      <button onclick="event.stopPropagation();removeTrack(${i})">🗑</button>
    </div>
  `;
  d.onclick=()=>play(i);
  c.appendChild(d);
 });
}

function play(i){
 current=i;
 audio.src=tracks[i].src;
 audio.play();
 playing=true;
 update();
}

function toggle(){
 if(!audio.src)return;
 playing?audio.pause():audio.play();
 playing=!playing;
 update();
}

function update(){
 document.getElementById('playBtn').innerText=playing?'⏹':'▶';
}

function next(){
 if(!tracks.length)return;
 current=shuffle?Math.floor(Math.random()*tracks.length):(current+1)%tracks.length;
 play(current);
}

function prev(){
 if(!tracks.length)return;
 current=(current-1+tracks.length)%tracks.length;
 play(current);
}

function toggleShuffle(){
 shuffle=!shuffle;
 document.getElementById('shuffleBtn').classList.toggle('active');
}

function toggleRepeat(){
 repeat=!repeat;
 document.getElementById('repeatBtn').classList.toggle('active');
}

audio.onended=()=>{
 repeat?play(current):next();
}

function like(i){
 tracks[i].liked=!tracks[i].liked;
}

function createPlaylist(){
 let name=prompt('Название');
 if(!name)return;
 playlists.push({name,tracks:[]});
 save(); renderPlaylists();
}

function addToPlaylist(i){
 if(!playlists.length){alert('Создай плейлист');return;}
 let list=playlists.map((p,i)=>i+': '+p.name).join('\n');
 let c=parseInt(prompt(list));
 if(!isNaN(c)&&playlists[c]){
  playlists[c].tracks.push(i);
  save();
 }
}

function removeTrack(i){
 tracks.splice(i,1);
 renderTracks();
}

function renderPlaylists(){
 let c=document.getElementById('playlists');
 c.innerHTML='';
 playlists.forEach((p,i)=>{
  let d=document.createElement('div');
  d.innerHTML=`${p.name} <button onclick="event.stopPropagation();removePlaylist(${i})">🗑</button>`;
  d.onclick=()=>showPlaylist(i);
  c.appendChild(d);
 });
}

function showPlaylist(i){
 let c=document.getElementById('tracks');
 c.innerHTML='';
 playlists[i].tracks.forEach(idx=>{
  let t=tracks[idx];
  let d=document.createElement('div');
  d.innerText=t.name;
  d.onclick=()=>play(idx);
  c.appendChild(d);
 });
}

function removePlaylist(i){
 playlists.splice(i,1);
 save(); renderPlaylists();
}

function save(){
 localStorage.setItem('playlists',JSON.stringify(playlists));
}

function showLibrary(){ renderTracks(); }

// progress
audio.addEventListener('timeupdate',()=>{
 if(audio.duration){
  progress.value=(audio.currentTime/audio.duration)*100;
  progress.style.setProperty('--value',progress.value+'%');
 }
});

progress.oninput=()=>{
 if(audio.duration){
  audio.currentTime=(progress.value/100)*audio.duration;
 }
};

volume.oninput=()=>{
 audio.volume=volume.value;
 volume.style.setProperty('--value',(volume.value*100)+'%');
};

renderTracks();
renderPlaylists();
</script>

</body>
</html>
