<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrapMusic Ultimate</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body { background:#050505; }
.glow { box-shadow:0 0 12px rgba(255,0,0,0.7); }
.scroll::-webkit-scrollbar { width:6px; }
.scroll::-webkit-scrollbar-thumb { background:#ff0000; }
.cover { width:40px; height:40px; background:#111; border:1px solid #400; border-radius:6px; object-fit:cover; }
</style>
</head>
<body class="text-white">

<div class="flex h-screen">

<div class="w-64 bg-black p-5 border-r border-red-900">
<h1 class="text-2xl text-red-500 mb-6">TRAPMUSIC</h1>

<button onclick="uploadClick()" class="bg-red-600 w-full py-2 rounded glow mb-4">Загрузить музыку</button>
<button onclick="createPlaylist()" class="bg-red-900 w-full py-2 rounded mb-4">+ Плейлист</button>

<div id="playlists" class="space-y-2"></div>
</div>

<div class="flex-1 p-6 overflow-y-auto scroll">
<input id="search" placeholder="Поиск..." class="w-full p-2 mb-6 bg-black border border-red-900 rounded">

<h2 class="text-lg mb-4">Библиотека</h2>
<div id="tracks" class="space-y-2"></div>
</div>

<div class="w-64 bg-black p-4 border-l border-red-900">
<h2 class="mb-4">Очередь</h2>
<div id="queue"></div>
</div>
</div>

<div class="fixed bottom-0 left-0 right-0 bg-black border-t border-red-900 p-3 flex items-center justify-between">
<div><div id="now">Нет трека</div></div>

<div class="flex gap-3">
<!-- 👉 ЗАМЕНИ ИКОНКИ ЗДЕСЬ -->
<button onclick="prev()">⏮</button>
<button onclick="toggle()" class="bg-red-600 px-4 py-2 rounded-full glow"><a href="https://www.flaticon.com/ru/free-icons/-" title="кнопка воспроизведения иконки">Кнопка воспроизведения иконки от Kiranshastry - Flaticon</a></button>
<button onclick="next()">⏭</button>
<button onclick="shuffle()">🔀</button>
<button onclick="repeat()">🔁</button>
</div>

<input type="range" id="progress" min="0" max="100" value="0" class="w-1/3">
<input type="range" id="volume" min="0" max="1" step="0.01" value="1">
</div>

<input type="file" id="fileInput" accept="audio/*" multiple hidden>
<audio id="audio"></audio>

<script>
let tracks=[];
let queue=[];
let playlists=[];
let current=0;
let playing=false;
let repeatMode=false;

const audio=document.getElementById('audio');
const progress=document.getElementById('progress');
const volume=document.getElementById('volume');
const now=document.getElementById('now');
const fileInput=document.getElementById('fileInput');
const search=document.getElementById('search');

// 🔥 LOCAL STORAGE LOAD
function loadData(){
 tracks = JSON.parse(localStorage.getItem('tracks')||'[]');
 playlists = JSON.parse(localStorage.getItem('playlists')||'[]');
 renderTracks();
 renderPlaylists();
}

function saveData(){
 localStorage.setItem('tracks', JSON.stringify(tracks));
 localStorage.setItem('playlists', JSON.stringify(playlists));
}

function uploadClick(){ fileInput.click(); }

fileInput.onchange=e=>{
 for(let f of e.target.files){
  if(!f.type.startsWith('audio/')) continue;
  let url=URL.createObjectURL(f);
  tracks.push({name:f.name,src:url,cover:''});
 }
 saveData();
 renderTracks();
}

function renderTracks(){
 let c=document.getElementById('tracks');
 c.innerHTML='';

 tracks.forEach((t,i)=>{
  let row=document.createElement('div');
  row.className='flex justify-between items-center p-3 border border-red-900 rounded hover:bg-red-900 cursor-pointer';

  row.innerHTML=`
    <div class="flex items-center gap-3">
      <img src="${t.cover||''}" class="cover" onclick="event.stopPropagation();uploadCover(${i})">
      <div>${t.name}</div>
    </div>
    <div class="flex gap-2">
      <!-- 👉 ЗАМЕНИ ИКОНКИ ЗДЕСЬ -->
      <button onclick="event.stopPropagation();addQueue(${i})">➕</button>
      <button onclick="event.stopPropagation();addToPlaylist(${i})">📂</button>
      <button onclick="event.stopPropagation();like(${i})">❤️</button>
    </div>
  `;

  row.onclick=()=>play(i);
  c.appendChild(row);
 });
}

function uploadCover(i){
 let input=document.createElement('input');
 input.type='file';
 input.accept='image/*';
 input.onchange=e=>{
  let file=e.target.files[0];
  if(file){
    tracks[i].cover=URL.createObjectURL(file);
    saveData();
    renderTracks();
  }
 };
 input.click();
}

async function play(i){
 try{
  current=i;
  audio.src=tracks[i].src;
  await audio.play();
  now.innerText=tracks[i].name;
  playing=true;
 }catch{}
}

function toggle(){
 if(!audio.src)return;
 playing?audio.pause():audio.play();
 playing=!playing;
}

function next(){
 if(queue.length) play(queue.shift());
 else if(tracks.length) play((current+1)%tracks.length);
 renderQueue();
}

function prev(){ if(tracks.length) play(current); }

function shuffle(){ tracks.sort(()=>Math.random()-0.5); renderTracks(); }

function repeat(){ repeatMode=!repeatMode; }

function addQueue(i){ queue.push(i); renderQueue(); }

function renderQueue(){
 let q=document.getElementById('queue');
 q.innerHTML='';
 queue.forEach(i=>{
  let d=document.createElement('div');
  d.innerText=tracks[i].name;
  q.appendChild(d);
 });
}

function like(i){ alert('Лайк: '+tracks[i].name); }

function createPlaylist(){
 let name=prompt('Название');
 if(!name)return;
 playlists.push({name,tracks:[]});
 saveData();
 renderPlaylists();
}

function addToPlaylist(trackIndex){
 if(!playlists.length){ alert('Сначала создай плейлист'); return; }
 let names=playlists.map((p,i)=> i+': '+p.name).join('\n');
 let choice=prompt('Выбери плейлист:\n'+names);
 let idx=parseInt(choice);
 if(playlists[idx]){
  playlists[idx].tracks.push(trackIndex);
  saveData();
 }
}

function renderPlaylists(){
 let c=document.getElementById('playlists');
 c.innerHTML='';
 playlists.forEach((p,i)=>{
  let d=document.createElement('div');
  d.className='cursor-pointer hover:text-red-500';
  d.innerText=p.name+` (${p.tracks.length})`;
  d.onclick=()=>showPlaylist(i);
  c.appendChild(d);
 });
}

function showPlaylist(i){
 let list=playlists[i];
 let c=document.getElementById('tracks');
 c.innerHTML='';
 list.tracks.forEach(idx=>{
  let t=tracks[idx];
  let row=document.createElement('div');
  row.className='p-3 border border-red-900 rounded';
  row.innerText=t.name;
  row.onclick=()=>play(idx);
  c.appendChild(row);
 });
}

// progress
audio.addEventListener('timeupdate',()=>{
 if(isFinite(audio.duration)&&audio.duration>0){
  progress.value=(audio.currentTime/audio.duration)*100;
 }
});

progress.oninput=()=>{
 if(isFinite(audio.duration)&&audio.duration>0){
  let t=(progress.value/100)*audio.duration;
  if(isFinite(t)) audio.currentTime=t;
 }
}

volume.oninput=()=> audio.volume=volume.value;

audio.onended=()=>{
 if(repeatMode) play(current);
 else next();
}

search.oninput=e=>{
 let val=e.target.value.toLowerCase();
 document.querySelectorAll('#tracks > div').forEach(d=>{
  d.style.display=d.innerText.toLowerCase().includes(val)?'flex':'none';
 });
}

// INIT
loadData();
</script>

</body>
</html>
