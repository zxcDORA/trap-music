<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Playlist</title>
</head>
<body>
    <h1>My Music Playlist</h1>
    <input type="text" id="songTitle" placeholder="Song Title">
    <input type="text" id="songURL" placeholder="Song URL">
    <button id="addSongBtn">Add Song</button>
    <h2>Playlist</h2>
    <ul id="playlist">
    </ul>
    <audio id="audioPlayer"></audio>
    <button id="prevBtn">Previous</button>
    <button id="playPauseBtn">Play</button>
    <button id="nextBtn">Next</button>

    <script>
        let playlist = JSON.parse(localStorage.getItem('playlist')) || [];
        const playlistElem = document.getElementById('playlist');
        const audioPlayer = document.getElementById('audioPlayer');
        let currentIndex = 0;

        function renderPlaylist() {
            playlistElem.innerHTML = '';
            playlist.forEach((song, index) => {
                const li = document.createElement('li');
                li.textContent = song.title;
                li.addEventListener('click', () => { currentIndex = index; playSong(); });
                playlistElem.appendChild(li);
            });
        }

        function playSong() {
            if (currentIndex >= 0 && currentIndex < playlist.length) {
                audioPlayer.src = playlist[currentIndex].url;
                audioPlayer.play();
            }
        }

        function updatePlayButton() {
            const playPauseBtn = document.getElementById('playPauseBtn');
            playPauseBtn.textContent = audioPlayer.paused ? 'Play' : 'Pause';
        }

        document.getElementById('addSongBtn').onclick = () => {
            const title = document.getElementById('songTitle').value;
            const url = document.getElementById('songURL').value;
            if (title && url) {
                playlist.push({ title, url });
                localStorage.setItem('playlist', JSON.stringify(playlist));
                renderPlaylist();
                document.getElementById('songTitle').value = '';
                document.getElementById('songURL').value = '';
            }
        };

        document.getElementById('playPauseBtn').onclick = () => {
            if (audioPlayer.paused) {
                playSong();
            } else {
                audioPlayer.pause();
            }
            updatePlayButton();
        };

        document.getElementById('nextBtn').onclick = () => {
            currentIndex = (currentIndex + 1) % playlist.length;
            playSong();
        };

        document.getElementById('prevBtn').onclick = () => {
            currentIndex = (currentIndex - 1 + playlist.length) % playlist.length;
            playSong();
        };

        renderPlaylist();
    </script>
</body>
</html>
